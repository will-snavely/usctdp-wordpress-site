# https://taskfile.dev

version: '3'

tasks:
  pull:
    cmds:
      - "{{.DOCKER_COMPOSE}} pull"

  docker-logs:
    cmds:
      - "{{.DOCKER_COMPOSE}} logs"

  shell:
    cmds:
      - >
        {{.DOCKER_COMPOSE}}
        exec -it
        --user {{.U | default "www-data"}}
        {{.S | default "web"}} bash

  wp:
    cmds:
      - "{{.WP_CLI}} {{.CLI_ARGS}}"

  tail-wp-log:
    cmds:
      - "{{.DOCKER_COMPOSE}} exec --user www-data web tail -n 50 -f {{.WP_LOG}}"

  sql:
    cmds:
      - >
        {{.DOCKER_COMPOSE}}
        exec -it db sh -c
        'mariadb -u root
        -p"$(cat /run/secrets/db_root_password_dev)"'
