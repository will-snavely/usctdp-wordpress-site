# https://taskfile.dev

version: '3'

vars:
  DOCKER_COMPOSE: "docker compose --env-file .env.prod -p usctdp_prod -f sage_dev/compose.prod.yaml"
  WP_HOME: /www/srv/usctdp-bedrock/web/wp
  WP_LOG: /www/srv/usctdp-bedrock/web/app/debug.log
  WP_CLI: "{{.DOCKER_COMPOSE}} exec --user www-data --workdir /www/srv/usctdp-bedrock/web/wp web wp"
  THEME_HOME: /www/srv/usctdp-bedrock/web/app/themes/usctdp-theme
  PLUGIN_HOME: /www/srv/usctdp-bedrock/web/app/plugins/usctdp-mgmt

includes:
  common:
    taskfile: ./Taskfile.common.yml
    vars: { 
      MODE: prod,
      DOCKER_COMPOSE: "{{.DOCKER_COMPOSE}}"
    }
    flatten: true


tasks:
  init:
    cmds:
      - cat /dev/urandom | tr -dc 'a-zA-Z0-9' | head -c 10 > .secret_db_password_{{.MODE}}
      - cat /dev/urandom | tr -dc 'a-zA-Z0-9' | head -c 10 > .secret_db_root_password_{{.MODE}}
      - cat /dev/urandom | tr -dc 'a-zA-Z0-9' | head -c 10 > .secret_admin_password_{{.MODE}}
      - python3 gen_config.py .env.{{.MODE}}.template {{.MODE}}

  up:
    cmds:
      - python3 gen_nginx_config.py .env.prod sage_dev/nginx/prod.conf.main sage_dev/nginx/prod.conf 
      - "{{.DOCKER_COMPOSE}} up -d"

  config-bedrock:
    cmds:
      - "{{.DOCKER_COMPOSE}} exec -u root web sh /app/scripts/web/config_bedrock.sh"

  config-apache:
    cmds:
      - "{{.DOCKER_COMPOSE}} exec -u root web sh /app/scripts/web/config_apache.sh"

  install-wordpress:
    cmds:
      - "{{.DOCKER_COMPOSE}} exec --user www-data --workdir {{.WP_HOME}} web bash /app/scripts/web/install_wordpress.sh"
      - "{{.WP_CLI}} plugin activate woocommerce"
      - "{{.WP_CLI}} plugin activate usctdp-mgmt"
      - "{{.WP_CLI}} plugin activate user-switching"
      - "{{.WP_CLI}} theme activate usctdp-theme"



  up-cert-init:
    cmds:
      - python3 gen_nginx_config.py .env.prod sage_dev/nginx/prod.conf.init sage_dev/nginx/prod.conf 
      - "{{.DOCKER_COMPOSE}} up -d proxy web db"

  down:
    cmds:
      - "{{.DOCKER_COMPOSE}} down"

  get-cert:
    cmds:
      - >
        {{.common.DOCKER_COMPOSE}} run --rm certbot certonly --webroot
        --webroot-path=/var/www/html
        --email will.snavely@gmail.com
        --agree-tos
        --no-eff-email
        -d usctdp.duckdns.org -d www.usctdp.duckdns.org

  deploy:
    cmds:
      - "{{.DOCKER_COMPOSE}} exec --user www-data --workdir {{.WP_HOME}} web bash /app/scripts/web/install_wordpress.sh"
      - "{{.WP_CLI}} plugin activate woocommerce"
      - "{{.WP_CLI}} plugin activate usctdp-mgmt"
      - "{{.WP_CLI}} plugin activate user-switching"
      - "{{.WP_CLI}} theme activate usctdp-theme"
